- title: Cryptocurrency Sentiment Index
  date: May 2018 - Apr. 2020
  description:
    - > 
      I created this project to visualize the relationship between a cryptocurrency's sentiment and its price. A set of 
      Python scripts periodically collect tweets matching basic keywords about the top 20 cryptocurrencies by volume, and
      gets a rudimentary polarity score based on the contents of the Tweet. 
    - > 
      With a web frontend built with React, users can view price and sentiment summaries for the top currencies and 
      visualize the correlation of the two metrics on a chart. This application makes API calls to a simple Python application built with Flask.
